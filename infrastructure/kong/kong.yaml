# ===========================================================================
# Kong Gateway Declarative Configuration
# Production-grade: services, routes, plugins for comprehensive API security.
# Includes OIDC, mTLS, GraphQL depth limiting, gRPC auth, canary releases,
# CORS enforcement, response transformation, and webhook signature validation.
# ===========================================================================

_format_version: "3.0"

# ===========================================================================
# Global Plugins (applied to all routes)
# ===========================================================================
plugins:
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true

  - name: response-transformer
    config:
      remove:
        headers:
          - X-Powered-By
          - Server
          - X-AspNet-Version
      add:
        headers:
          - "X-Content-Type-Options: nosniff"
          - "X-Frame-Options: DENY"

# ===========================================================================
# Services
# ===========================================================================
services:
  # ── User Service ──
  - name: user-service
    url: http://10.0.10.60:8081
    protocol: http
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: users-route
        paths:
          - /api/v1/users
        methods:
          - GET
          - POST
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_claim_name: iss
          secret_is_base64: false
      - name: request-validator
        config:
          allowed_content_types:
            - application/json
      - name: acl
        config:
          allow:
            - users-group

  # ── User Export Sub-route (Sensitive Data) ──
  - name: user-export-service
    url: http://10.0.10.60:8081/export
    protocol: http
    routes:
      - name: users-export-route
        paths:
          - /api/v1/users/export
        methods:
          - GET
        strip_path: false
    plugins:
      - name: oauth2
        config:
          scopes:
            - "users:read:export"
          mandatory_scope: true
          enable_authorization_code: true
      - name: ip-restriction
        config:
          deny:
            - 203.0.113.0/24

  # ── User by ID (BOLA-susceptible) ──
  - name: user-by-id-service
    url: http://10.0.10.60:8081
    protocol: http
    routes:
      - name: users-by-id-route
        paths:
          - /api/v1/users/(?P<id>\d+)
        methods:
          - GET
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
            - sub
          key_claim_name: iss
      - name: request-termination
        config:
          status_code: 401
          message: "JWT sub claim must match requested user ID"
        enabled: false  # Enabled via custom plugin logic at runtime

  # ── Search Service ──
  - name: search-service
    url: http://10.0.10.61:8082
    protocol: http
    routes:
      - name: search-route
        paths:
          - /api/v1/search
        methods:
          - GET
          - POST
        strip_path: false
    plugins:
      - name: request-validator
        config:
          allowed_content_types:
            - application/json
          body_schema: |
            {
              "type": "object",
              "properties": {
                "q": {"type": "string", "maxLength": 500}
              }
            }

  # ── Order Service ──
  - name: order-service
    url: http://10.0.10.62:8083
    protocol: http
    routes:
      - name: orders-route
        paths:
          - /api/v1/orders
        methods:
          - GET
          - POST
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_claim_name: iss

  # ── Internal Config (restricted) ──
  - name: internal-config-service
    url: http://10.0.10.60:8081/internal/config
    protocol: http
    routes:
      - name: internal-config-route
        paths:
          - /api/v1/internal/config
        methods:
          - GET
        strip_path: false
    plugins:
      - name: ip-restriction
        config:
          allow:
            - 10.0.0.0/16
      - name: key-auth
        config:
          key_names:
            - X-Service-Key

  # ── Internal Admin (restricted) ──
  - name: internal-admin-service
    url: http://10.0.10.60:8081/internal/admin
    protocol: http
    routes:
      - name: internal-admin-route
        paths:
          - /api/v1/internal/admin
        methods:
          - GET
        strip_path: false
    plugins:
      - name: ip-restriction
        config:
          allow:
            - 10.0.0.0/16
      - name: jwt
        config:
          claims_to_verify:
            - exp
            - role
      - name: acl
        config:
          allow:
            - admin-group

  # ── Auth Service (login + auth) ──
  - name: auth-service
    url: http://10.0.10.63:8084
    protocol: http
    routes:
      - name: login-route
        paths:
          - /api/v1/login
        methods:
          - POST
        strip_path: false
      - name: auth-route
        paths:
          - /api/v1/auth
        methods:
          - POST
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
          fault_tolerant: true
      - name: ip-restriction
        config:
          deny:
            - 203.0.113.0/24

  # ── Products Service ──
  - name: products-service
    url: http://10.0.10.64:8085
    protocol: http
    routes:
      - name: products-route
        paths:
          - /api/v1/products
        methods:
          - GET
        strip_path: false
    plugins:
      - name: bot-detection
        config:
          deny:
            - HeadlessChrome
            - PhantomJS
            - Scrapy
            - python-requests
      - name: proxy-cache
        config:
          response_code:
            - 200
          request_method:
            - GET
          content_type:
            - application/json
          cache_ttl: 300
          strategy: memory
          cache_control: true
          vary_headers:
            - Accept
            - Accept-Encoding

  # ── Data Service (API key exposure protection) ──
  - name: data-service
    url: http://10.0.10.65:8086
    protocol: http
    routes:
      - name: data-route
        paths:
          - /api/v1/data
        methods:
          - GET
        strip_path: false
    plugins:
      - name: request-transformer
        config:
          remove:
            querystring:
              - api_key
          add:
            headers:
              - "X-Api-Key-Stripped: true"

  # ── Upload Service ──
  - name: upload-service
    url: http://10.0.10.66:8087
    protocol: http
    routes:
      - name: upload-route
        paths:
          - /api/v1/upload
        methods:
          - POST
        strip_path: false
    plugins:
      - name: request-size-limiting
        config:
          allowed_payload_size: 10
          size_unit: megabytes

  # ── Files Service (path traversal target) ──
  - name: files-service
    url: http://10.0.10.67:8088
    protocol: http
    routes:
      - name: files-route
        paths:
          - /api/v1/files
        methods:
          - GET
        strip_path: false
    plugins:
      - name: request-validator
        config:
          allowed_content_types:
            - application/json

  # ── Exec Service (command injection target) ──
  - name: exec-service
    url: http://10.0.10.68:8089
    protocol: http
    routes:
      - name: exec-route
        paths:
          - /api/v1/exec
        methods:
          - POST
        strip_path: false
    plugins:
      - name: ip-restriction
        config:
          allow:
            - 10.0.0.0/16
      - name: request-validator
        config:
          allowed_content_types:
            - application/json

  # ── Fetch Service (SSRF target) ──
  - name: fetch-service
    url: http://10.0.10.69:8085
    protocol: http
    routes:
      - name: fetch-route
        paths:
          - /api/v1/fetch
        methods:
          - POST
        strip_path: false
    plugins:
      - name: ip-restriction
        config:
          allow:
            - 10.0.0.0/16

  # ── Reset-password Service ──
  - name: reset-password-service
    url: http://10.0.10.63:8084/reset-password
    protocol: http
    routes:
      - name: reset-password-route
        paths:
          - /api/v1/reset-password
        methods:
          - POST
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 3
          policy: local
          fault_tolerant: true

  # ── XML Service ──
  - name: xml-service
    url: http://10.0.10.70:8090
    protocol: http
    routes:
      - name: xml-route
        paths:
          - /api/v1/xml
        methods:
          - POST
        strip_path: false
    plugins:
      - name: request-validator
        config:
          allowed_content_types:
            - application/json
            - application/xml

  # ── Validate Service (ReDoS target) ──
  - name: validate-service
    url: http://10.0.10.71:8091
    protocol: http
    routes:
      - name: validate-route
        paths:
          - /api/v1/validate
        methods:
          - POST
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 20
          policy: local
          fault_tolerant: true

  # ── Report Service v1 (authenticated) ──
  - name: report-service-v1
    url: http://10.0.10.72:8092
    protocol: http
    routes:
      - name: reports-v1-route
        paths:
          - /api/v1/reports
        methods:
          - GET
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
      - name: acl
        config:
          allow:
            - reports-group

  # ── Report Service v2 — TRUE POSITIVE: NO AUTH PLUGIN ──
  # This route was added during a fast migration to v2.
  # The team forgot to attach any authentication plugin.
  # No WAF rule covers it. The network SG allows internal traffic.
  # This is the GENUINE THREAT — the one true positive.
  - name: report-service-v2
    url: http://10.0.10.72:8092/v2
    protocol: http
    routes:
      - name: reports-v2-route
        paths:
          - /api/v2/reports
        methods:
          - GET
        strip_path: false
    # NO PLUGINS — no auth, no rate-limiting, no validation.
    # This is intentionally unprotected.

  # ===========================================================================
  # NEW SERVICES — Phase 2 Complex Scenarios
  # ===========================================================================

  # ── GraphQL Service ──
  # Protected by depth limiting, introspection blocking, and JWT auth.
  - name: graphql-service
    url: http://10.0.10.75:8095
    protocol: http
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 10000
    routes:
      - name: graphql-route
        paths:
          - /api/v1/graphql
        methods:
          - POST
          - OPTIONS
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_claim_name: iss
      - name: request-validator
        config:
          allowed_content_types:
            - application/json
          body_schema: |
            {
              "type": "object",
              "required": ["query"],
              "properties": {
                "query": {"type": "string", "maxLength": 5000},
                "variables": {"type": "object"},
                "operationName": {"type": "string", "maxLength": 200}
              },
              "additionalProperties": false
            }
      - name: request-size-limiting
        config:
          allowed_payload_size: 1
          size_unit: megabytes
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          fault_tolerant: true

  # ── Webhook Receiver Service ──
  # Validates webhook signatures, restricts IPs to known providers.
  - name: webhook-service
    url: http://10.0.10.76:8096
    protocol: http
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: webhooks-route
        paths:
          - /api/v1/webhooks
        methods:
          - POST
        strip_path: false
    plugins:
      - name: ip-restriction
        config:
          allow:
            - 3.18.12.63/32      # Stripe webhook IP
            - 3.130.192.231/32   # Stripe webhook IP
            - 13.235.14.237/32   # Stripe webhook IP
            - 203.0.114.0/24     # Partner B2B
      - name: request-validator
        config:
          allowed_content_types:
            - application/json
      - name: hmac-auth
        config:
          enforce_headers:
            - X-Webhook-Signature
          algorithms:
            - hmac-sha256

  # ── Payment Service ──
  # PCI-DSS compliant: strict auth, rate limiting, request validation.
  - name: payment-service
    url: http://10.0.10.77:8097
    protocol: http
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 10000
    routes:
      - name: payments-route
        paths:
          - /api/v1/payments
        methods:
          - POST
          - GET
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
            - sub
          key_claim_name: iss
      - name: acl
        config:
          allow:
            - payments-group
      - name: rate-limiting
        config:
          minute: 5
          policy: local
          fault_tolerant: true
      - name: request-validator
        config:
          allowed_content_types:
            - application/json
          body_schema: |
            {
              "type": "object",
              "required": ["amount", "currency"],
              "properties": {
                "amount": {"type": "number", "minimum": 0.01, "maximum": 100000},
                "currency": {"type": "string", "enum": ["USD", "EUR", "GBP"]},
                "description": {"type": "string", "maxLength": 500},
                "idempotency_key": {"type": "string", "maxLength": 64}
              },
              "additionalProperties": false
            }
      - name: request-size-limiting
        config:
          allowed_payload_size: 1
          size_unit: megabytes

  # ── SSO / OIDC Auth Service ──
  # Single Sign-On endpoint protected by OpenID Connect.
  - name: sso-service
    url: http://10.0.10.63:8084/sso
    protocol: http
    routes:
      - name: sso-route
        paths:
          - /api/v1/sso
        methods:
          - GET
          - POST
        strip_path: false
    plugins:
      - name: openid-connect
        config:
          issuer: "https://idp.example.com/.well-known/openid-configuration"
          client_id: "kong-api-gateway"
          client_secret: "{vault://env/OIDC_CLIENT_SECRET}"
          scopes:
            - openid
            - profile
            - email
          auth_methods:
            - authorization_code
            - session
          redirect_uri: "https://api.example.com/api/v1/sso/callback"
          token_endpoint_auth_method: client_secret_post
          verify_claims: true
          verify_nonce: true
          verify_signature: true

  # ── Profile Service with CORS ──
  # User profile endpoint with strict CORS policy.
  - name: profile-service
    url: http://10.0.10.60:8081/profile
    protocol: http
    routes:
      - name: profile-route
        paths:
          - /api/v1/profile
        methods:
          - GET
          - PUT
          - OPTIONS
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
            - sub
      - name: cors
        config:
          origins:
            - "https://app.example.com"
            - "https://admin.example.com"
          methods:
            - GET
            - PUT
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          credentials: true
          max_age: 86400
          preflight_continue: false

  # ── gRPC Inventory Service ──
  # gRPC endpoint with JWT auth and rate limiting.
  - name: grpc-inventory-service
    url: grpc://10.0.10.78:50051
    protocol: grpc
    routes:
      - name: grpc-inventory-route
        paths:
          - /inventory.InventoryService
        protocols:
          - grpc
          - grpcs
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  # ── Deprecated v0 API (request-termination) ──
  # Returns 410 Gone for all v0 endpoints — forces clients to upgrade.
  - name: deprecated-v0-service
    url: http://10.0.10.60:8081  # never actually reached
    protocol: http
    routes:
      - name: deprecated-v0-route
        paths:
          - /api/v0
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: false
    plugins:
      - name: request-termination
        config:
          status_code: 410
          message: "API v0 has been deprecated and removed. Please migrate to /api/v1/ or /api/v2/."
          content_type: "application/json"

  # ── Canary Release: User Service v2 (gradual rollout) ──
  # 10% of traffic routed to v2 for testing new user service version.
  - name: user-service-v2-canary
    url: http://10.0.10.80:8081
    protocol: http
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: users-v2-canary-route
        paths:
          - /api/v2/users
        methods:
          - GET
          - POST
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_claim_name: iss
      - name: canary
        config:
          percentage: 10
          upstream_host: 10.0.10.80
          upstream_port: 8081
          upstream_fallback: true

  # ── Session Management Service ──
  # Handles session tokens with strict cookie security.
  - name: session-service
    url: http://10.0.10.63:8084/sessions
    protocol: http
    routes:
      - name: session-route
        paths:
          - /api/v1/sessions
        methods:
          - POST
          - DELETE
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 15
          policy: local
          fault_tolerant: true
      - name: response-transformer
        config:
          add:
            headers:
              - "Set-Cookie: session_id={upstream_cookie}; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=3600"
      - name: request-validator
        config:
          allowed_content_types:
            - application/json

  # ── Roles/Permissions Service (privilege escalation target) ──
  # Requires admin JWT role claim + ACL group for role management.
  - name: roles-service
    url: http://10.0.10.60:8081/roles
    protocol: http
    routes:
      - name: roles-route
        paths:
          - /api/v1/roles
        methods:
          - GET
          - POST
          - PUT
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
            - role
          key_claim_name: iss
      - name: acl
        config:
          allow:
            - admin-group
      - name: ip-restriction
        config:
          allow:
            - 10.0.0.0/16
      - name: request-validator
        config:
          allowed_content_types:
            - application/json
          body_schema: |
            {
              "type": "object",
              "properties": {
                "user_id": {"type": "string"},
                "role": {"type": "string", "enum": ["viewer", "editor", "admin"]},
                "permissions": {
                  "type": "array",
                  "items": {"type": "string"},
                  "maxItems": 20
                }
              },
              "additionalProperties": false
            }

  # ===========================================================================
  # TRUE POSITIVE #2: Internal Admin Functions — NO ACL PLUGIN
  # ===========================================================================
  # A new internal endpoint for bulk user operations was added in a rush.
  # The developer added JWT auth but FORGOT the ACL plugin.
  # Any authenticated user (not just admins) can access bulk operations.
  # This is a Broken Function Level Authorization vulnerability.
  - name: admin-bulk-operations-service
    url: http://10.0.10.60:8081/admin/bulk
    protocol: http
    routes:
      - name: admin-bulk-route
        paths:
          - /api/v1/admin/bulk
        methods:
          - POST
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_claim_name: iss
      # NO ACL PLUGIN — any authenticated user can access admin bulk operations.
      # This is intentionally misconfigured (true positive scenario).

  # ===========================================================================
  # TRUE POSITIVE #3: New Internal Service — Misconfigured Network + No Auth
  # ===========================================================================
  # A new analytics service was deployed to a fresh subnet but the security
  # group was cloned from the public-facing ALB SG instead of the internal SG.
  # No auth plugins were applied. This creates a network-level + auth gap.
  - name: analytics-internal-service
    url: http://10.0.10.90:8098
    protocol: http
    routes:
      - name: analytics-internal-route
        paths:
          - /api/internal/analytics
        methods:
          - GET
          - POST
        strip_path: false
    # NO PLUGINS — no auth, no rate-limiting, no validation.
    # Combined with misconfigured SG (see Terraform analytics_sg),
    # this is accessible from the internet.
