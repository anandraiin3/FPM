# ===========================================================================
# NGINX Configuration — Reverse Proxy + Rate Limiting + ModSecurity WAF
# Production-grade with geo-blocking, bot detection, request smuggling
# prevention, CORS enforcement, and security headers.
# ===========================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

load_module modules/ngx_http_modsecurity_module.so;
load_module modules/ngx_http_geoip2_module.so;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';
    log_format json_combined escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri",'
        '"status":$status,"body_bytes":$body_bytes_sent,'
        '"user_agent":"$http_user_agent","request_time":$request_time,'
        '"geo_country":"$geoip2_data_country_code"}';

    access_log /var/log/nginx/access.log main;
    access_log /var/log/nginx/access_json.log json_combined;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ── GeoIP2 Database ──
    geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
        auto_reload 60m;
        $geoip2_data_country_code country iso_code;
    }

    # ── Geo-blocking map: block high-risk countries ──
    map $geoip2_data_country_code $blocked_country {
        default 0;
        RU 1;    # Russia
        CN 1;    # China
        KP 1;    # North Korea
        IR 1;    # Iran
    }

    # ── Bot detection map based on User-Agent ──
    map $http_user_agent $is_bad_bot {
        default 0;
        ~*(?i)(sqlmap|nikto|nessus|masscan|zgrab)         1;
        ~*(?i)(dirbuster|gobuster|wfuzz|hydra|medusa)     1;
        ~*(?i)(scrapy|phantomjs|headlesschrome)            1;
        ~*(?i)(python-requests|go-http-client|java/)       1;
        ~*(?i)(curl/|wget/|libwww-perl)                    1;
        ""                                                  1;  # empty UA
    }

    # ── Client body size limit: 10MB ──
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # ── Request smuggling prevention ──
    # Reject requests with both Content-Length and Transfer-Encoding
    # (handled via ModSecurity rule 1020, but also enforce at NGINX level)
    ignore_invalid_headers on;
    underscores_in_headers off;

    # ── Rate Limiting Zones ──

    # General API zone: 100 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;

    # Auth zone: 10 requests per minute per IP (login, auth)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;

    # Reset-password zone: 3 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api_reset:10m rate=3r/m;

    # Validate zone: 20 requests per minute per IP (ReDoS protection)
    limit_req_zone $binary_remote_addr zone=api_validate:10m rate=20r/m;

    # GraphQL zone: 30 requests per minute per IP (complex queries are expensive)
    limit_req_zone $binary_remote_addr zone=api_graphql:10m rate=30r/m;

    # Webhook zone: 60 requests per minute per source IP
    limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=60r/m;

    # Payment zone: 5 requests per minute per IP (very sensitive)
    limit_req_zone $binary_remote_addr zone=api_payment:10m rate=5r/m;

    # Connection limiting per IP (DDoS mitigation)
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ── Load ModSecurity ──
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsecurity/modsecurity.conf;

    # ── Upstream: Kong Gateway ──
    upstream kong_gateway {
        server 10.0.10.50:8000;
        keepalive 32;
    }

    # ── Upstream: Kong gRPC ──
    upstream kong_grpc {
        server 10.0.10.50:9080;
    }

    # ── Security Headers (applied to all responses) ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide server version
    server_tokens off;

    # ── HTTPS server ──
    server {
        listen 80;
        listen 443 ssl http2;
        server_name api.example.com;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Proxy timeouts ──
        proxy_read_timeout    10s;
        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;

        # ── Connection limit per IP ──
        limit_conn conn_per_ip 50;

        # ── Geo-blocking: return 403 for blocked countries ──
        if ($blocked_country) {
            return 403;
        }

        # ── Bot blocking: return 403 for known bad bots ──
        if ($is_bad_bot) {
            return 403;
        }

        # ── CORS preflight handler ──
        # Enforce strict origin checking for cross-origin requests.
        set $cors_origin "";
        if ($http_origin ~* "^https://(app\.example\.com|admin\.example\.com|dashboard\.example\.com)$") {
            set $cors_origin $http_origin;
        }

        # ── Default location: general rate limit ──
        location / {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Strip hop-by-hop headers (request smuggling prevention)
            proxy_set_header Transfer-Encoding "";

            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Max-Age 86400 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── Auth endpoints: strict rate limit ──
        location /api/v1/login {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/auth {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Reset-password: very strict rate limit ──
        location /api/v1/reset-password {
            limit_req zone=api_reset burst=2 nodelay;
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Validate: ReDoS protection rate limit ──
        location /api/v1/validate {
            limit_req zone=api_validate burst=5 nodelay;
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Upload: body size already limited by client_max_body_size 10m ──
        location /api/v1/upload {
            limit_req zone=api_general burst=10 nodelay;
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Restrict allowed content types for uploads
            if ($content_type !~* "^(multipart/form-data|application/octet-stream)") {
                return 415;
            }
        }

        # ── GraphQL endpoint: dedicated rate limit ──
        location /api/v1/graphql {
            limit_req zone=api_graphql burst=10 nodelay;
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Only allow POST for GraphQL
            if ($request_method !~ ^(POST|OPTIONS)$) {
                return 405;
            }
        }

        # ── Webhook receiver: moderate rate limit, restrict source ──
        location /api/v1/webhooks {
            limit_req zone=api_webhook burst=20 nodelay;
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Only POST allowed for webhooks
            if ($request_method != POST) {
                return 405;
            }
        }

        # ── Payment endpoint: strictest rate limit, enhanced security ──
        location /api/v1/payments {
            limit_req zone=api_payment burst=2 nodelay;
            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Only POST and GET for payments
            if ($request_method !~ ^(POST|GET|OPTIONS)$) {
                return 405;
            }
        }

        # ── gRPC proxy ──
        location /grpc/ {
            grpc_pass grpc://kong_grpc;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # gRPC timeout
            grpc_read_timeout 30s;
            grpc_send_timeout 30s;
        }

        # ── Deprecated v0 API: return 410 Gone ──
        location /api/v0/ {
            return 410 '{"error": "API v0 has been deprecated. Please use /api/v1/ or /api/v2/."}';
            add_header Content-Type "application/json" always;
        }

        # ── Block access to internal/hidden paths ──
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~ ^/(internal|_internal|debug|actuator|metrics)/ {
            # Only allow from VPC CIDR
            allow 10.0.0.0/16;
            allow 10.1.0.0/16;
            deny all;

            proxy_pass http://kong_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Health check (no rate limit) ──
        location /health {
            proxy_pass http://kong_gateway;
            access_log off;
        }
    }
}
