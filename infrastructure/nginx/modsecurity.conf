# ===========================================================================
# ModSecurity Configuration — CRS Rules + Custom SecRules
# ===========================================================================

# ── Engine ON ──
SecRuleEngine On

# ── Request body access ──
SecRequestBodyAccess On
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 1048576

# ── Response body access ──
SecResponseBodyAccess Off

# ── Audit logging ──
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/modsec_audit.log

# ── Temp path ──
SecTmpDir /tmp/modsecurity/tmp
SecDataDir /tmp/modsecurity/data

# ===========================================================================
# OWASP CRS Rule Includes
# ===========================================================================

# SQL Injection rules (CRS rule ID 942100 range)
Include /etc/modsecurity/crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf

# XSS rules (CRS rule ID 941100 range)
Include /etc/modsecurity/crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf

# LFI / Path Traversal rules (CRS rule ID 930100 range)
Include /etc/modsecurity/crs/rules/REQUEST-930-APPLICATION-ATTACK-LFI.conf

# RCE / Command Injection rules (CRS rule ID 932100 range)
Include /etc/modsecurity/crs/rules/REQUEST-932-APPLICATION-ATTACK-RCE.conf

# ===========================================================================
# Custom SecRules
# ===========================================================================

# Rule 1001: SQL Injection detection (custom supplement to CRS)
SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx (?i)(?:union\s+select|or\s+1\s*=\s*1|;\s*drop\s+table|--\s*$|'\s*or\s*')" \
    "id:1001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Custom SQLi Detection',\
    tag:'attack-sqli',\
    severity:'CRITICAL'"

# Rule 1003: Path Traversal detection
SecRule ARGS|REQUEST_URI "@rx (?:\.\./|\.\.\\\\|%2e%2e%2f|%2e%2e/|\.%2e/|%2e\.)" \
    "id:1003,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Path Traversal Attempt Blocked',\
    tag:'attack-lfi',\
    severity:'CRITICAL'"

# Rule 1004: Command Injection detection
SecRule ARGS|REQUEST_BODY "@rx (?:;\s*(?:cat|ls|wget|curl|bash|sh|nc|python|perl|ruby)\s|`[^`]+`|\$\([^)]+\)|&&\s*(?:cat|rm|wget))" \
    "id:1004,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Command Injection Attempt Blocked',\
    tag:'attack-rce',\
    severity:'CRITICAL'"

# Rule 1006: XML/XXE Injection detection
SecRule REQUEST_BODY "@rx (?:<!(?:DOCTYPE|ENTITY)[^>]*(?:SYSTEM|PUBLIC))" \
    "id:1006,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'XXE/XML Injection Attempt Blocked',\
    tag:'attack-xxe',\
    severity:'CRITICAL'"

# Rule 1007: Payload size limit (request body > 10MB)
SecRule REQUEST_BODY_LENGTH "@gt 10485760" \
    "id:1007,\
    phase:1,\
    deny,\
    status:413,\
    log,\
    msg:'Oversized Request Body Rejected',\
    tag:'policy-size',\
    severity:'WARNING'"
