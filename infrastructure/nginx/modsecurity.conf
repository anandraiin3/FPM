# ===========================================================================
# ModSecurity Configuration — CRS 4.x + Custom SecRules
# Production WAF with anomaly scoring, API protection, data leak prevention,
# request smuggling detection, and advanced bot mitigation.
# ===========================================================================

# ── Engine ON ──
SecRuleEngine On

# ── Request body access ──
SecRequestBodyAccess On
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 1048576
SecRequestBodyLimitAction Reject

# ── Response body access (enabled for data leak prevention) ──
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html application/json application/xml
SecResponseBodyLimit 5242880
SecResponseBodyLimitAction ProcessPartial

# ── Audit logging ──
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/modsec_audit.log

# ── Temp path ──
SecTmpDir /tmp/modsecurity/tmp
SecDataDir /tmp/modsecurity/data

# ── Anomaly scoring mode (CRS 4.x default) ──
# Requests accumulate an anomaly score; blocked only when threshold exceeded.
# Paranoia Level 2: catches more attacks, acceptable false-positive rate.
SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.blocking_paranoia_level=2"
SecAction "id:900001,phase:1,nolog,pass,t:none,setvar:tx.detection_paranoia_level=2"

# Anomaly score thresholds
SecAction "id:900100,phase:1,nolog,pass,t:none,setvar:tx.inbound_anomaly_score_threshold=5"
SecAction "id:900101,phase:1,nolog,pass,t:none,setvar:tx.outbound_anomaly_score_threshold=4"

# ── Allowed HTTP methods ──
SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:'tx.allowed_methods=GET HEAD POST PUT DELETE OPTIONS PATCH'"

# ── Allowed content types ──
SecAction "id:900220,phase:1,nolog,pass,t:none,setvar:'tx.allowed_request_content_type=|application/json|application/xml|text/xml|multipart/form-data|application/x-www-form-urlencoded|application/grpc|application/grpc+proto|'"

# ── File upload restrictions ──
SecAction "id:900250,phase:1,nolog,pass,t:none,setvar:'tx.allowed_request_content_type_charset=|utf-8|iso-8859-1|'"

# ===========================================================================
# OWASP CRS 4.x Rule Includes
# ===========================================================================

# Phase 1: Request headers
Include /etc/modsecurity/crs/crs-setup.conf
Include /etc/modsecurity/crs/rules/REQUEST-901-INITIALIZATION.conf
Include /etc/modsecurity/crs/rules/REQUEST-905-COMMON-EXCEPTIONS.conf
Include /etc/modsecurity/crs/rules/REQUEST-911-METHOD-ENFORCEMENT.conf
Include /etc/modsecurity/crs/rules/REQUEST-913-SCANNER-DETECTION.conf
Include /etc/modsecurity/crs/rules/REQUEST-920-PROTOCOL-ENFORCEMENT.conf
Include /etc/modsecurity/crs/rules/REQUEST-921-PROTOCOL-ATTACK.conf

# Phase 2: Request body
Include /etc/modsecurity/crs/rules/REQUEST-930-APPLICATION-ATTACK-LFI.conf
Include /etc/modsecurity/crs/rules/REQUEST-931-APPLICATION-ATTACK-RFI.conf
Include /etc/modsecurity/crs/rules/REQUEST-932-APPLICATION-ATTACK-RCE.conf
Include /etc/modsecurity/crs/rules/REQUEST-933-APPLICATION-ATTACK-PHP.conf
Include /etc/modsecurity/crs/rules/REQUEST-934-APPLICATION-ATTACK-GENERIC.conf
Include /etc/modsecurity/crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf
Include /etc/modsecurity/crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
Include /etc/modsecurity/crs/rules/REQUEST-943-APPLICATION-ATTACK-SESSION-FIXATION.conf
Include /etc/modsecurity/crs/rules/REQUEST-944-APPLICATION-ATTACK-JAVA.conf

# Phase 3-4: Response
Include /etc/modsecurity/crs/rules/RESPONSE-950-DATA-LEAKAGES.conf
Include /etc/modsecurity/crs/rules/RESPONSE-951-DATA-LEAKAGES-SQL.conf
Include /etc/modsecurity/crs/rules/RESPONSE-952-DATA-LEAKAGES-JAVA.conf
Include /etc/modsecurity/crs/rules/RESPONSE-953-DATA-LEAKAGES-PHP.conf
Include /etc/modsecurity/crs/rules/RESPONSE-954-DATA-LEAKAGES-IIS.conf

# Phase 5: Logging and scoring evaluation
Include /etc/modsecurity/crs/rules/RESPONSE-959-BLOCKING-EVALUATION.conf
Include /etc/modsecurity/crs/rules/RESPONSE-980-CORRELATION.conf

# ===========================================================================
# Custom SecRules — Application-specific protections
# ===========================================================================

# ── Rule 1001: SQL Injection detection (custom supplement to CRS) ──
SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx (?i)(?:union\s+select|or\s+1\s*=\s*1|;\s*drop\s+table|--\s*$|'\s*or\s*')" \
    "id:1001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Custom SQLi Detection',\
    tag:'attack-sqli',\
    severity:'CRITICAL'"

# ── Rule 1003: Path Traversal detection ──
SecRule ARGS|REQUEST_URI "@rx (?:\.\./|\.\.\\\\|%2e%2e%2f|%2e%2e/|\.%2e/|%2e\.)" \
    "id:1003,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Path Traversal Attempt Blocked',\
    tag:'attack-lfi',\
    severity:'CRITICAL'"

# ── Rule 1004: Command Injection detection ──
SecRule ARGS|REQUEST_BODY "@rx (?:;\s*(?:cat|ls|wget|curl|bash|sh|nc|python|perl|ruby)\s|`[^`]+`|\$\([^)]+\)|&&\s*(?:cat|rm|wget))" \
    "id:1004,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Command Injection Attempt Blocked',\
    tag:'attack-rce',\
    severity:'CRITICAL'"

# ── Rule 1006: XML/XXE Injection detection ──
SecRule REQUEST_BODY "@rx (?:<!(?:DOCTYPE|ENTITY)[^>]*(?:SYSTEM|PUBLIC))" \
    "id:1006,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'XXE/XML Injection Attempt Blocked',\
    tag:'attack-xxe',\
    severity:'CRITICAL'"

# ── Rule 1007: Payload size limit (request body > 10MB) ──
SecRule REQUEST_BODY_LENGTH "@gt 10485760" \
    "id:1007,\
    phase:1,\
    deny,\
    status:413,\
    log,\
    msg:'Oversized Request Body Rejected',\
    tag:'policy-size',\
    severity:'WARNING'"

# ── Rule 1010: Prototype pollution detection (__proto__, constructor) ──
SecRule ARGS|REQUEST_BODY "@rx (?:__proto__|constructor\s*\[|Object\.(?:assign|defineProperty|setPrototypeOf))" \
    "id:1010,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Prototype Pollution Attempt Blocked',\
    tag:'attack-injection',\
    severity:'CRITICAL'"

# ── Rule 1011: Open redirect detection ──
SecRule ARGS "@rx (?i)(?:(?:redirect|return|next|url|goto|target|destination|continue)_?(?:url|uri|to|path)?=https?://(?!(?:app|api|www)\.example\.com))" \
    "id:1011,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Open Redirect Attempt Blocked — external URL in redirect parameter',\
    tag:'attack-redirect',\
    severity:'HIGH'"

# ── Rule 1012: Server-Side Template Injection (SSTI) detection ──
SecRule ARGS|REQUEST_BODY "@rx (?:\{\{.*\}\}|\$\{.*\}|<%.*%>|#\{.*\}|\{\%.*\%\})" \
    "id:1012,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'SSTI Attempt Blocked — template expression in input',\
    tag:'attack-ssti',\
    severity:'CRITICAL'"

# ── Rule 1013: Mass assignment / parameter pollution detection ──
# Blocks attempts to inject admin/role/privilege fields into request body
SecRule REQUEST_BODY "@rx (?i)(?:\"(?:is_?admin|role|privilege|permission|access_?level|is_?superuser|is_?staff)\"\s*:\s*(?:true|\"admin\"|1))" \
    "id:1013,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Mass Assignment Attempt Blocked — privilege escalation fields in body',\
    tag:'attack-mass-assignment',\
    severity:'HIGH'"

# ── Rule 1015: GraphQL introspection blocking (production) ──
SecRule REQUEST_BODY "@rx (?:__schema|__type|introspectionQuery)" \
    "id:1015,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'GraphQL Introspection Blocked in Production',\
    tag:'policy-graphql',\
    severity:'MEDIUM'"

# ── Rule 1016: GraphQL depth attack detection ──
SecRule REQUEST_BODY "@rx (?:\{[^}]*\{[^}]*\{[^}]*\{[^}]*\{[^}]*\{)" \
    "id:1016,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'GraphQL Depth Attack Blocked — query nesting exceeds 5 levels',\
    tag:'attack-graphql-depth',\
    severity:'HIGH'"

# ── Rule 1020: HTTP Request Smuggling detection ──
# Block requests with both Content-Length and Transfer-Encoding headers
SecRule REQUEST_HEADERS:Transfer-Encoding "!@rx ^$" \
    "id:1020,\
    phase:1,\
    chain,\
    deny,\
    status:400,\
    log,\
    msg:'HTTP Request Smuggling — CL/TE conflict detected',\
    tag:'attack-smuggling',\
    severity:'CRITICAL'"
    SecRule REQUEST_HEADERS:Content-Length "!@rx ^$"

# ── Rule 1021: Transfer-Encoding obfuscation detection ──
SecRule REQUEST_HEADERS:Transfer-Encoding "@rx (?i)(?:chunked\s*,\s*identity|identity\s*,\s*chunked|\x0b|\x0c)" \
    "id:1021,\
    phase:1,\
    deny,\
    status:400,\
    log,\
    msg:'HTTP Request Smuggling — obfuscated Transfer-Encoding',\
    tag:'attack-smuggling',\
    severity:'CRITICAL'"

# ── Rule 1025: Session fixation via cookie injection ──
SecRule REQUEST_HEADERS:Cookie "@rx (?:(?:session_?id|JSESSIONID|PHPSESSID|connect\.sid)\s*=\s*['\"])" \
    "id:1025,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Cookie Injection / Session Fixation Attempt',\
    tag:'attack-session',\
    severity:'HIGH'"

# ── Rule 1030: Cache poisoning — unkeyed header injection ──
SecRule REQUEST_HEADERS "@rx (?i)(?:X-Forwarded-Host|X-Original-URL|X-Rewrite-URL):\s*[^\s]" \
    "id:1030,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Cache Poisoning Attempt — unkeyed header injection',\
    tag:'attack-cache-poisoning',\
    severity:'HIGH'"

# ===========================================================================
# Response Body Inspection — Data Leak Prevention (DLP)
# ===========================================================================

# ── Rule 1050: Credit card number leak detection ──
SecRule RESPONSE_BODY "@rx \b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|6(?:011|5[0-9]{2})[0-9]{12})\b" \
    "id:1050,\
    phase:4,\
    deny,\
    status:500,\
    log,\
    msg:'DATA LEAK: Credit card number detected in response body',\
    tag:'dlp-credit-card',\
    severity:'CRITICAL'"

# ── Rule 1051: US Social Security number leak detection ──
SecRule RESPONSE_BODY "@rx \b[0-9]{3}-[0-9]{2}-[0-9]{4}\b" \
    "id:1051,\
    phase:4,\
    deny,\
    status:500,\
    log,\
    msg:'DATA LEAK: SSN pattern detected in response body',\
    tag:'dlp-ssn',\
    severity:'CRITICAL'"

# ── Rule 1052: AWS access key leak detection ──
SecRule RESPONSE_BODY "@rx (?:AKIA|ABIA|ACCA|ASIA)[A-Z0-9]{16}" \
    "id:1052,\
    phase:4,\
    deny,\
    status:500,\
    log,\
    msg:'DATA LEAK: AWS access key detected in response body',\
    tag:'dlp-aws-key',\
    severity:'CRITICAL'"

# ── Rule 1053: Private key / certificate leak detection ──
SecRule RESPONSE_BODY "@rx (?:-----BEGIN (?:RSA |EC |DSA )?PRIVATE KEY-----)" \
    "id:1053,\
    phase:4,\
    deny,\
    status:500,\
    log,\
    msg:'DATA LEAK: Private key material detected in response body',\
    tag:'dlp-private-key',\
    severity:'CRITICAL'"

# ── Rule 1054: Stack trace / debug info leak detection ──
SecRule RESPONSE_BODY "@rx (?:(?:Traceback \(most recent call last\))|(?:at [a-zA-Z0-9_]+\.[a-zA-Z0-9_]+\(.*\.java:[0-9]+\))|(?:Fatal error:.*on line [0-9]+))" \
    "id:1054,\
    phase:4,\
    deny,\
    status:500,\
    log,\
    msg:'DATA LEAK: Application stack trace detected in response body',\
    tag:'dlp-stack-trace',\
    severity:'HIGH'"

# ── Rule 1055: Database connection string leak detection ──
SecRule RESPONSE_BODY "@rx (?i)(?:(?:jdbc|mongodb|postgres|mysql|redis)://[^\s\"']+(?:@|password=))" \
    "id:1055,\
    phase:4,\
    deny,\
    status:500,\
    log,\
    msg:'DATA LEAK: Database connection string detected in response body',\
    tag:'dlp-connection-string',\
    severity:'CRITICAL'"

# ===========================================================================
# Advanced Bot Detection Rules
# ===========================================================================

# ── Rule 1060: Scanner tool detection via headers ──
SecRule REQUEST_HEADERS "@rx (?i)(?:burp|owasp|zap|acunetix|netsparker|qualys|nmap)" \
    "id:1060,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Security Scanner Detected via request headers',\
    tag:'automation-scanner',\
    severity:'MEDIUM'"

# ── Rule 1061: Abnormal header order / missing standard headers ──
SecRule &REQUEST_HEADERS:Accept "@eq 0" \
    "id:1061,\
    phase:1,\
    log,\
    pass,\
    setvar:tx.anomaly_score=+2,\
    msg:'Missing Accept header — possible automated tool',\
    tag:'automation-missing-headers',\
    severity:'LOW'"
