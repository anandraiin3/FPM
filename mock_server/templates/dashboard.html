<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traceable Mock Server — Alert Dashboard</title>
<style>
  :root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--purple:#a855f7}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:1.5rem}
  h1{font-size:1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
  h1 span{color:var(--accent)}

  /* Stats bar */
  .stats{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:.5rem;padding:.75rem 1.25rem;min-width:140px}
  .stat .label{font-size:.75rem;text-transform:uppercase;color:var(--muted);letter-spacing:.05em}
  .stat .value{font-size:1.5rem;font-weight:700;margin-top:.25rem}
  .stat .value.green{color:var(--green)} .stat .value.red{color:var(--red)}
  .stat .value.yellow{color:var(--yellow)} .stat .value.blue{color:var(--accent)}

  /* Table */
  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:.5rem}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th{background:var(--surface);position:sticky;top:0;text-align:left;padding:.6rem .75rem;color:var(--muted);font-weight:600;text-transform:uppercase;font-size:.7rem;letter-spacing:.05em}
  td{padding:.55rem .75rem;border-top:1px solid var(--border);vertical-align:top;max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tr:hover td{background:rgba(59,130,246,.06)}

  /* Verdict badges */
  .badge{display:inline-block;padding:.15rem .5rem;border-radius:9999px;font-size:.7rem;font-weight:600;text-transform:uppercase}
  .badge-fp{background:rgba(34,197,94,.15);color:var(--green)}
  .badge-tp{background:rgba(239,68,68,.15);color:var(--red)}
  .badge-partial{background:rgba(234,179,8,.15);color:var(--yellow)}
  .badge-human{background:rgba(168,85,247,.15);color:var(--purple)}
  .badge-pending{background:rgba(148,163,184,.15);color:var(--muted)}

  /* Severity badges */
  .sev-critical{color:var(--red);font-weight:700}
  .sev-high{color:var(--orange);font-weight:600}
  .sev-medium{color:var(--yellow)} .sev-low{color:var(--green)}

  /* Auto-refresh indicator */
  .refresh{font-size:.75rem;color:var(--muted);margin-left:auto}

  /* Detail modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
  .overlay.active{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;max-width:700px;width:95%;max-height:85vh;overflow-y:auto;padding:1.5rem}
  .modal h2{font-size:1.1rem;margin-bottom:1rem}
  .modal .close{float:right;cursor:pointer;font-size:1.2rem;color:var(--muted)}
  .modal .close:hover{color:var(--text)}
  .detail-grid{display:grid;grid-template-columns:140px 1fr;gap:.35rem .75rem;font-size:.85rem}
  .detail-grid dt{color:var(--muted);font-weight:600}
  .detail-grid dd{word-break:break-word;white-space:pre-wrap}
</style>
</head>
<body>

<h1><span>Traceable</span> Alert Dashboard <span class="refresh" id="refreshLabel">Auto-refresh: 10s</span></h1>

<div class="stats" id="stats"></div>
<div class="table-wrap"><table>
  <thead><tr>
    <th>Time</th><th>Alert ID</th><th>Attack Type</th><th>Endpoint</th>
    <th>Method</th><th>Severity</th><th>Status</th><th>Verdict</th>
    <th>Confidence</th><th>Latency</th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table></div>

<!-- Detail modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle">Alert Detail</h2>
    <dl class="detail-grid" id="modalBody"></dl>
  </div>
</div>

<script>
const REFRESH_MS=10000;
const API_ALL='/alerts/all', API_STATS='/alerts/stats';

function verdictBadge(v){
  if(!v)return '<span class="badge badge-pending">pending</span>';
  const m={FALSE_POSITIVE:'fp',TRUE_POSITIVE:'tp',PARTIAL_RISK:'partial',NEEDS_HUMAN_REVIEW:'human'};
  return `<span class="badge badge-${m[v]||'pending'}">${v.replace(/_/g,' ')}</span>`;
}
function sevClass(s){return 'sev-'+(s||'low').toLowerCase();}
function shortId(id){return id?id.substring(0,12)+'…':'';}
function fmtTime(ts){try{return new Date(ts).toLocaleString();}catch(e){return ts;}}

async function refresh(){
  try{
    const [alertsRes,statsRes]=await Promise.all([fetch(API_ALL),fetch(API_STATS)]);
    const alerts=await alertsRes.json(), stats=await statsRes.json();
    renderStats(stats);
    renderTable(alerts);
  }catch(e){console.error('Refresh failed',e);}
}

function renderStats(s){
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="label">Total</div><div class="value blue">${s.total}</div></div>
    <div class="stat"><div class="label">Pending</div><div class="value yellow">${s.pending}</div></div>
    <div class="stat"><div class="label">Analysed</div><div class="value">${s.analysed}</div></div>
    <div class="stat"><div class="label">False Positive</div><div class="value green">${s.false_positive}</div></div>
    <div class="stat"><div class="label">True Positive</div><div class="value red">${s.true_positive}</div></div>
    <div class="stat"><div class="label">Partial Risk</div><div class="value yellow">${s.partial_risk}</div></div>
    <div class="stat"><div class="label">Needs Review</div><div class="value">${s.needs_human_review}</div></div>`;
}

let allAlerts=[];
function renderTable(alerts){
  allAlerts=alerts;
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=alerts.map((a,i)=>`<tr style="cursor:pointer" onclick="showDetail(${i})">
    <td>${fmtTime(a.timestamp)}</td>
    <td title="${a.alert_id}">${shortId(a.alert_id)}</td>
    <td>${a.attack_type}</td>
    <td>${a.target_endpoint}</td>
    <td>${a.http_method}</td>
    <td class="${sevClass(a.severity)}">${a.severity}</td>
    <td>${a.status}</td>
    <td>${verdictBadge(a.verdict)}</td>
    <td>${a.confidence!=null?Math.round(a.confidence*100)+'%':'-'}</td>
    <td>${a.analysis_latency_ms!=null?a.analysis_latency_ms+'ms':'-'}</td>
  </tr>`).join('');
}

function showDetail(idx){
  const a=allAlerts[idx];if(!a)return;
  document.getElementById('modalTitle').textContent=`Alert: ${a.alert_id}`;
  const fields=[
    ['Alert ID',a.alert_id],['Timestamp',fmtTime(a.timestamp)],
    ['Source IP',a.source_ip],['Endpoint',a.target_endpoint],
    ['Method',a.http_method],['Attack Type',a.attack_type],
    ['Severity',a.severity],['Traceable Reason',a.traceable_reason],
    ['Payload Snippet',a.payload_snippet],['Status',a.status],
    ['Verdict',a.verdict||'—'],['Confidence',a.confidence!=null?Math.round(a.confidence*100)+'%':'—'],
    ['Reasoning',a.reasoning||'—'],
    ['Controls Found',Array.isArray(a.controls_found)?a.controls_found.join(', '):'—'],
    ['Coverage Gaps',Array.isArray(a.coverage_gaps)?a.coverage_gaps.join(', '):'—'],
    ['Recommended Action',a.recommended_action||'—'],
    ['Analysed At',a.analysed_at?fmtTime(a.analysed_at):'—'],
    ['Tokens Used',a.tokens_used??'—'],['Latency (ms)',a.analysis_latency_ms??'—'],
  ];
  document.getElementById('modalBody').innerHTML=fields.map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join('');
  document.getElementById('overlay').classList.add('active');
}
function closeModal(){document.getElementById('overlay').classList.remove('active');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

refresh();
setInterval(refresh,REFRESH_MS);
</script>
</body>
</html>
